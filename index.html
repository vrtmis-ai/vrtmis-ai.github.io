<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page-level title / description / canonical / Open Graph / Twitter are
         rendered PER ROUTE by React (App, WorkIndex, CaseStudy) and baked into
         each page by the prerender step. Kept out of this template so prerendered
         pages don't end up with duplicate title/og tags. -->
    <meta name="author" content="Mahbod Tavassoli" />
    <meta name="keywords" content="Mahbod Tavassoli, visual artist, AI creative, VFX, video mapping, AI visual production, motion graphics, live visuals, Tehran, artemis.studio, TouchDesigner, ComfyUI, Resolume" />

    <!-- ── Default link-preview (Open Graph / Twitter) ──
         Vercel serves a plain (non-prerendered) build, and link scrapers don't
         run JS — so the preview image/title MUST live in the static HTML here.
         React still sets richer per-route values for real browsers; these are
         the crawler fallback (and the home values). -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vrtmis.ir/" />
    <meta property="og:title" content="Mahbod Tavassoli — Visual Artist & AI Creative" />
    <meta property="og:description" content="Tehran-based visual artist — VFX, video mapping, AI visual production, motion, and live show visuals." />
    <meta property="og:image" content="https://vrtmis.ir/og-cover.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="artemis.studio" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mahbod Tavassoli — Visual Artist & AI Creative" />
    <meta name="twitter:description" content="Tehran-based visual artist — VFX, video mapping, AI production, live show visuals." />
    <meta name="twitter:image" content="https://vrtmis.ir/og-cover.jpg" />
    <link rel="canonical" href="https://vrtmis.ir/" />

    <!-- ── Favicon — the MT logo, recoloured white + tightly cropped square ── -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="theme-color" content="#000000" />

    <!-- The studio intro <video> is mounted only when the first-load veil
         lifts, so its dark poster isn't fetched until then. Preload it so the
         dark frame paints instantly on mount (no flash of the lit room behind
         it before the dark→lights-up intro starts). -->
    <link rel="preload" as="image" href="/room/scene-1-dark.jpg" />

    <!-- ── Schema.org Person JSON-LD (site-wide author entity) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Mahbod Tavassoli",
      "alternateName": "MT",
      "url": "https://vrtmis.ir/",
      "image": "https://vrtmis.ir/mt-logo.png",
      "jobTitle": "Visual Artist & AI Creative",
      "worksFor": {
        "@type": "Organization",
        "name": "artemis.studio",
        "url": "https://artemis.studio/"
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Tehran",
        "addressCountry": "Iran"
      },
      "email": "mailto:mahbodtavassoli@outlook.com",
      "telephone": "+989909270038",
      "knowsAbout": [
        "VFX",
        "Video Mapping",
        "AI Visual Production",
        "Motion Graphics",
        "Live Visual Performance",
        "Compositing",
        "Generative AI Pipelines"
      ],
      "knowsLanguage": [
        { "@type": "Language", "name": "Persian", "alternateName": "fa" },
        { "@type": "Language", "name": "English", "alternateName": "en" }
      ],
      "alumniOf": {
        "@type": "CollegeOrUniversity",
        "name": "Tehran South Azad University"
      },
      "sameAs": [
        "https://instagram.com/thvrtmis",
        "https://t.me/vrtmis",
        "https://linkedin.com/in/mahbod-tavassoli-thvrtmis"
      ]
    }
    </script>

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>

    <!-- Speculation Rules: prerender the work pages the moment a link to them
         is hovered/about to be clicked, so the first hard navigation to /work
         (or a shared case-study URL) paints instantly. Supported browsers
         only; others ignore it. Pairs with the in-app hover chunk-preload. -->
    <script type="speculationrules">
    {
      "prerender": [
        {
          "where": { "href_matches": "/work*" },
          "eagerness": "moderate"
        }
      ]
    }
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
